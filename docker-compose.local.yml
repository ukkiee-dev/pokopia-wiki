name: pokopia-local

services:
  postgres:
    image: postgres:17-alpine
    container_name: pokopia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pokopia
      POSTGRES_USER: pokopia
      POSTGRES_PASSWORD: pokopia_local_dev
    ports:
      - '5432:5432'
    volumes:
      - pokopia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pokopia -d pokopia']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pokopia_pgdata:

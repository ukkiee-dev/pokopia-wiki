name: Create App

# 이 워크플로우는 app-starter 템플릿으로 생성된 레포에서
# 해당 앱을 homelab 에 등록 (DNS + Tunnel + k8s manifests + ArgoCD Application).
# 템플릿 레포 자체에서는 실행 스킵.
#
# Phase 4 (2026-04-21): 입력 12개 → 2개로 축소.
# 설정은 services/<service-name>/.app-config.yml 에서 읽어 homelab reusable workflow 에 전달.

on:
  workflow_dispatch:
    inputs:
      service-name:
        description: "모노레포 서비스 이름 (services/<name>). pnpm workspace 구조와 일치."
        required: true
        type: string
      subdomain:
        description: "서브도메인 (비우면 <repo>-<service>). DNS 레코드에 반영."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: homelab-terraform
  cancel-in-progress: false

jobs:
  # ─── 템플릿 레포 자체에서는 스킵. derived 레포에서만 동작 ───
  # .app-config.yml 을 caller 측에서 읽어 homelab reusable workflow 에 문자열로 전달.
  # 이 패턴은 GitHub App token 이 repositories: homelab 으로 제한되어 있어
  # homelab composite 가 앱 레포를 직접 checkout 할 수 없기 때문에 필요.
  read-config:
    if: github.repository != 'ukkiee-dev/app-starter'
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.cat.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - id: cat
        env:
          SERVICE: ${{ inputs.service-name }}
        run: |
          set -euo pipefail
          CONFIG_PATH="services/${SERVICE}/.app-config.yml"
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "::error::${CONFIG_PATH} not found. pnpm service:add 로 서비스를 먼저 생성하세요."
            exit 1
          fi
          # GITHUB_OUTPUT multiline 구문
          {
            echo "config<<__EOF__"
            cat "$CONFIG_PATH"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

  create:
    needs: read-config
    if: github.repository != 'ukkiee-dev/app-starter'
    uses: ukkiee-dev/homelab/.github/workflows/_create-app.yml@main
    with:
      app-name:     ${{ github.event.repository.name }}
      service-name: ${{ inputs.service-name }}
      subdomain:    ${{ inputs.subdomain }}
      config-yaml:  ${{ needs.read-config.outputs.config }}
    secrets:
      APP_ID:               ${{ secrets.HOMELAB_APP_ID }}
      APP_PRIVATE_KEY:      ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
      TF_CLOUDFLARE_TOKEN:  ${{ secrets.TF_CLOUDFLARE_TOKEN }}
      TF_ZONE_ID:           ${{ secrets.TF_ZONE_ID }}
      TF_TUNNEL_ID:         ${{ secrets.TF_TUNNEL_ID }}
      TF_ACCOUNT_ID:        ${{ secrets.TF_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      TF_DOMAIN:            ${{ secrets.TF_DOMAIN }}
      TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}

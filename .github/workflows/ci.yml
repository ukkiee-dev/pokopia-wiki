name: CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: 설정 파싱 ─────────────────────────────────────────
  config:
    runs-on: ubuntu-latest
    outputs:
      app-name:       ${{ github.event.repository.name }}
      setup-done:     ${{ steps.setup-check.outputs.exists }}
      health:         ${{ steps.parse.outputs.health }}
      icon:           ${{ steps.parse.outputs.icon }}
      description:    ${{ steps.parse.outputs.description }}
      config-changed: ${{ steps.diff.outputs.changed }}

    steps:
      - name: Check if app is setup
        id: setup-check
        env:
          APP_NAME: ${{ github.event.repository.name }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/ukkiee-dev/homelab/contents/manifests/apps/${APP_NAME}/deployment.yaml")
          EXISTS=$([ "$STATUS" = "200" ] && echo "true" || echo "false")
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
          if [ "$EXISTS" = "false" ]; then
            echo "::notice::create-app을 먼저 실행하세요. CI를 스킵합니다."
          fi

      - uses: actions/checkout@v4
        if: steps.setup-check.outputs.exists == 'true'
        with:
          fetch-depth: 0

      - name: Install yq
        if: steps.setup-check.outputs.exists == 'true'
        uses: mikefarah/yq@v4

      - name: Parse .app-config.yml
        if: steps.setup-check.outputs.exists == 'true'
        id: parse
        run: |
          set -euo pipefail
          HEALTH=$(yq '.health // ""' .app-config.yml)
          ICON=$(yq '.icon // ""' .app-config.yml)
          DESCRIPTION=$(yq '.description // ""' .app-config.yml)

          echo "health=$HEALTH"           >> $GITHUB_OUTPUT
          echo "icon=$ICON"               >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT

      - name: Check config changed
        if: steps.setup-check.outputs.exists == 'true'
        id: diff
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=1
          elif ! git cat-file -e "$BEFORE" 2>/dev/null; then
            CHANGED=1
          else
            CHANGED=$(git diff "$BEFORE" HEAD --name-only | grep -c '.app-config.yml' || true)
          fi
          echo "changed=$([[ $CHANGED -gt 0 ]] && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── Job 2: 품질 검사 (lint / format / typecheck) ─────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm type-check

  # ── Job 3: 빌드 & GHCR 푸시 ─────────────────────────────────
  build:
    needs: [config, quality]
    if: needs.config.outputs.setup-done == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ukkiee-dev/${{ needs.config.outputs.app-name }}:latest
            ghcr.io/ukkiee-dev/${{ needs.config.outputs.app-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify failure (Telegram)
        if: failure()
        env:
          APP_NAME: ${{ needs.config.outputs.app-name }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="❌ 빌드 실패: ${APP_NAME}%0A${RUN_URL}"

  # ── Job 4: 이미지 태그 갱신 → ArgoCD 배포 ───────────────────
  update-manifest:
    needs: [config, build]
    uses: ukkiee-dev/homelab/.github/workflows/_update-image.yml@main
    with:
      app-name:  ${{ needs.config.outputs.app-name }}
      image-tag: ${{ github.sha }}
    secrets:
      APP_ID:              ${{ secrets.HOMELAB_APP_ID }}
      APP_PRIVATE_KEY:     ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}

  # ── Job 5: .app-config.yml 변경 시 homelab 동기화 ────────────
  sync-config:
    needs: [config, build, update-manifest]
    if: needs.config.outputs.config-changed == 'true'
    uses: ukkiee-dev/homelab/.github/workflows/_sync-app-config.yml@main
    with:
      app-name:    ${{ needs.config.outputs.app-name }}
      health:      ${{ needs.config.outputs.health }}
      icon:        ${{ needs.config.outputs.icon }}
      description: ${{ needs.config.outputs.description }}
    secrets:
      APP_ID:          ${{ secrets.HOMELAB_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}

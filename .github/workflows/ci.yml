name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'prisma/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  # ─── template 레포 자체는 모든 CI 스킵 ───
  # github.repository != 'ukkiee-dev/app-starter' 로 파생된 <my-app> 레포에서만 동작
  # services/<svc>/Dockerfile 이 있는 디렉토리를 자동 감지하여 matrix 생성

  discover:
    if: github.repository != 'ukkiee-dev/app-starter'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.scan.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: scan
        run: |
          set -euo pipefail
          SERVICES=$(find services -mindepth 2 -maxdepth 2 -name Dockerfile 2>/dev/null \
            | awk -F/ '{print $2}' | sort -u | jq -R . | jq -sc .)
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "발견된 서비스: $SERVICES"

  config:
    if: github.repository != 'ukkiee-dev/app-starter'
    needs: discover
    runs-on: ubuntu-latest
    outputs:
      setup-done:      ${{ steps.check.outputs.exists }}
      app-name:        ${{ github.event.repository.name }}
      health-services: ${{ steps.health-diff.outputs.services }}
    steps:
      - name: Check homelab project shell exists
        id: check
        env:
          APP_NAME: ${{ github.event.repository.name }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/ukkiee-dev/homelab/contents/manifests/apps/${APP_NAME}/kustomization.yaml")
          EXISTS=$([ "$STATUS" = "200" ] && echo "true" || echo "false")
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
          if [ "$EXISTS" = "false" ]; then
            echo "::notice::homelab에 프로젝트가 없습니다. _create-app.yml(app-name=${APP_NAME}, service-name=<svc>) 먼저 실행하세요."
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.exists == 'true'
        with:
          fetch-depth: 0

      - name: Detect services with changed .app-config.yml
        if: steps.check.outputs.exists == 'true'
        id: health-diff
        env:
          BEFORE:       ${{ github.event.before }}
          ALL_SERVICES: ${{ needs.discover.outputs.services }}
        run: |
          set -euo pipefail
          CHANGED="[]"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            # 최초 push / force push — 모든 서비스 sync
            CHANGED="$ALL_SERVICES"
          else
            DIFF=$(git diff "$BEFORE" HEAD --name-only | grep -E '^services/[^/]+/\.app-config\.yml$' || true)
            if [ -n "$DIFF" ]; then
              CHANGED=$(echo "$DIFF" | awk -F/ '{print $2}' | sort -u | jq -R . | jq -sc .)
            fi
          fi
          echo "services=$CHANGED" >> "$GITHUB_OUTPUT"
          echo ".app-config.yml 변경 서비스: $CHANGED"

  quality:
    if: github.repository != 'ukkiee-dev/app-starter'
    runs-on: ubuntu-latest
    # Prisma 7 의 prisma.config.ts 가 env('DATABASE_URL') eager evaluate — pnpm install
    # 의 postinstall (prisma generate) 시점에 placeholder 가 필요하다. 런타임에는 K8s
    # Secret 으로 오버라이드. type-check / test 에서도 shared 가 prisma client import 시
    # config 가 다시 평가될 수 있어 job 레벨 env 로 모든 step 상속.
    env:
      DATABASE_URL: postgres://placeholder@127.0.0.1:5432/x
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test
      # NOTE: pnpm format:check 는 별도 PR 에서 활성화. 현재 services/scraper/src/parsers/serebii/__fixtures__/
      # 의 Serebii HTML snapshot 들이 oxfmt 룰을 위반 (외부 데이터 — 수정 불가). .oxfmtrc 에
      # __fixtures__/ 제외 룰 추가가 선결 작업.

  build:
    needs: [discover, config, quality]
    if: needs.config.outputs.setup-done == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ukkiee-dev/homelab/.github/actions/build-and-push@main
        with:
          app-name:     ${{ needs.config.outputs.app-name }}
          service:      ${{ matrix.service }}
          image-tag:    ${{ github.sha }}
          platforms:    linux/amd64,linux/arm64
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify failure (Telegram)
        if: failure()
        env:
          APP_NAME: ${{ needs.config.outputs.app-name }}
          SERVICE:  ${{ matrix.service }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$TG_TOKEN" ] && exit 0
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="❌ 빌드 실패: ${APP_NAME}/${SERVICE}%0A${RUN_URL}"

  update-manifest:
    needs: [discover, config, build]
    if: needs.config.outputs.setup-done == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.services) }}
    uses: ukkiee-dev/homelab/.github/workflows/_update-image.yml@main
    with:
      app-name:  ${{ needs.config.outputs.app-name }}
      service:   ${{ matrix.service }}
      image-tag: ${{ github.sha }}
    secrets:
      APP_ID:              ${{ secrets.HOMELAB_APP_ID }}
      APP_PRIVATE_KEY:     ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}

  # health 변경된 서비스들의 {service, health} 쌍을 matrix include로 준비
  # icon / description 은 homelab 의 update-app-config.yml dispatch 책임
  prepare-health-matrix:
    needs: [config]
    if: needs.config.outputs.setup-done == 'true' && needs.config.outputs.health-services != '[]'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: mikefarah/yq@v4
      - id: build
        env:
          SERVICES: ${{ needs.config.outputs.health-services }}
        run: |
          set -euo pipefail
          MATRIX="[]"
          for svc in $(jq -r '.[]' <<< "$SERVICES"); do
            CFG="services/$svc/.app-config.yml"
            [ -f "$CFG" ] || continue
            H=$(yq '.health // ""' "$CFG")
            [ -z "$H" ] && continue
            MATRIX=$(jq --arg s "$svc" --arg h "$H" '. + [{"service":$s,"health":$h}]' <<< "$MATRIX")
          done
          echo "matrix=$(jq -c . <<< "$MATRIX")" >> "$GITHUB_OUTPUT"
          echo "sync 대상: $(jq -c . <<< "$MATRIX")"

  sync-health:
    needs: [config, prepare-health-matrix, update-manifest]
    if: needs.prepare-health-matrix.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-health-matrix.outputs.matrix) }}
    uses: ukkiee-dev/homelab/.github/workflows/_sync-app-config.yml@main
    with:
      app-name: ${{ needs.config.outputs.app-name }}
      service:  ${{ matrix.service }}
      health:   ${{ matrix.health }}
    secrets:
      APP_ID:          ${{ secrets.HOMELAB_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
